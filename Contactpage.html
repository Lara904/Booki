<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Booki</title>
  <meta name="description" content="Contactez Booki pour toute question concernant votre réservation, votre hébergement ou vos activités à Marseille." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
  <header>
    <div class="container">
      <h1>Booki</h1>
      <nav>
        <ul>
          <li><a href="Homepage.html#hebergements">Hébergements</a></li>
          <li><a href="Homepage.html#activites">Activités</a></li>
          <li><a href="Contactpage.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact-form">
      <h2>Contactez-nous</h2>
      <form action="#" method="POST">
        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" placeholder="Votre nom" required />

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" placeholder="Votre email" required />

        <label for="message">Message :</label>
        <textarea id="message" name="message" rows="5" placeholder="Votre message..." required></textarea>

        <button type="submit">Envoyer</button>
      </form>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 Agence de Voyage Booki - Tous droits réservés</p>
    </div>
  </footer>
</body>
</html>
